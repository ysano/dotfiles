# =============================================================================
# Claude worktree ランチャー
# prefix + w で popup を開き、worktree の作成/切替/削除と claude 起動を行う。
# コア実装: ~/.tmux/claude/worktree_launch.sh
# =============================================================================
# -d で popup の cwd をキー押下時の pane のパスにする
# → 現在 Claude Code を動かしているリポジトリを軸に worktree を作る
bind-key w display-popup -E -w 80% -h 60% -d "#{pane_current_path}" "~/.tmux/claude/worktree_launch.sh popup"
