# bell.conf — tmux で BEL を受け取った時に効果音を鳴らす
#
# 経緯: Ghostty 1.3.1 の bell-features = audio が当環境で発火しない問題を
#       回避するため、tmux 側で alert-bell hook を捕捉して直接 OS の audio
#       コマンドを叩く。詳細は .tmux/bell.sh のコメント参照。
#
# 前提:
#   - monitor-bell on (base.conf で設定済) … 個別 window でも有効化
#   - 実体スクリプト ~/.tmux/bell.sh が実行可能であること
#
# 環境変数:
#   - TMUX_BELL_SOUND … 任意の絶対パスで音源を上書き可能
#   - TMUX_BELL_DISABLED=true … hook を登録しない (CI など無音環境向け)

# 既存 window へも monitor-bell を適用（base.conf は -g なので新規 window 用）
set -wg monitor-bell on

# alert-bell: ペインで BEL を受信した時に発火
if-shell '[ "${TMUX_BELL_DISABLED:-false}" != "true" ] && [ -x ~/.tmux/bell.sh ]' \
  "set-hook -g alert-bell 'run-shell -b ~/.tmux/bell.sh'"
